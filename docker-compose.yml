version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity_graph
      POSTGRES_USER: identity_graph
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_graph"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-enterprise
    profiles: ["neo4j"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-change-me}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4j_data:/data
    ports:
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-change-me} 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://identity_graph:${DATABASE_PASSWORD:-change-me}@postgres:5432/identity_graph
      AUTH_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-64-char-string}
      AUTH_ADMIN_USERNAME: ${AUTH_ADMIN_USERNAME:-admin}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:-change-me}
      NEO4J_ENABLED: "false"
      CORS_ORIGIN: http://localhost:80,http://localhost:5173
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  neo4j_data:
